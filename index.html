<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CryptoPro Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body>

<header class="navbar">
  <h2>⚡ CryptoPro</h2>
  <nav>
    <a href="#">Dashboard</a>
    <a href="#">Market</a>
    <a href="#">Signals</a>
  </nav>
</header>

<main class="container">

  <!-- LEFT PANEL -->
  <section class="panel left">

    <div class="card">
      <h3>📊 Live Market</h3>
      <div id="priceBox">Loading...</div>
    </div>

    <div class="card">
      <h3>📡 Signals</h3>
      <div id="signalsBox">No signals yet</div>
      <button onclick="generateSignals()">Generate Signal</button>
    </div>

  </section>

  <!-- RIGHT PANEL -->
  <section class="panel right">

    <div class="card big">
      <h3>📈 Trading Chart</h3>
      <div id="tradingview_chart"></div>
    </div>

  </section>

</main>

<footer>
  <p>© 2026 CryptoPro Dashboard</p>
</footer>

<script src="java.js"></script>

<script>
new TradingView.widget({
  "width": "100%",
  "height": 500,
  "symbol": "OANDA:XAUUSD",
  "interval": "15",
  "theme": "dark",
  "style": "1",
  "container_id": "tradingview_chart"
});
</script>

</body>
</html>
